format = '''
$time $all$os$status$container$shell$character
'''
## Line One
# First param ‚îÄ‚îå
# Prompt: optional param 1
[time]
format = " [‚ï≠‚îÄ](bold red)\\[[$time]($style)\\]"
style = "bold bright-green"
time_format = "%F %T"
disabled = false

[username]
format = "‚ûú [$user]($style)@"
style_user = "bold yellow"
style_root = "bold green"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) [$ssh_symbol](bold blue) in "
style = "bold green"
trim_at = ".atlas."
ssh_symbol = "Û∞£Ä"
ssh_only = false
disabled = false

# Third param
[directory]
style = "purple"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "white"
ahead = "‚á°${count}"
diverged = "‚áï‚á°${ahead_count}‚á£${behind_count}"
behind = "‚á£${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration]($style)"
disabled = false

## Line 2
# Prompt: param 2 ‚îî‚îÄ
[character]
success_symbol = "‚îÄ‚û§ [‚àö](bold green)"
error_symbol = "‚îÄ‚û§ [√ó](bold red)"

# SYMBOLS
[status]
format = ' [\[$symbol - $status\]]($style) '
map_symbol = true
disabled = false

[os]
format = " [‚ï∞‚îÄ](bold red) [$symbol $name]($style) "
style = "bold blue"
disabled = false

[docker_context]
symbol = "Ôåà "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[python]
symbol = "ÓòÜ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[nodejs]
format = "via [Ô¢ò Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[shell]
fish_indicator = 'Û∞à∫ '
powershell_indicator = 'ÔëÝ_ '
bash_indicator = 'Û∞¨â '
zsh_indicator = 'Û∞¨° '
